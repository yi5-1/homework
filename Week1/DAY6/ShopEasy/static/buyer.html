<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>買家首頁 - 電商購物網站</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft JhengHei', sans-serif;
    background: #f2f4f8; color: #333;
  }
  .navbar {
    background: white; padding: 12px 24px;
    display: flex; align-items: center; gap: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 10;
  }
  .navbar h2 { font-size: 18px; color: #2a5cb5; }
  .navbar .spacer { flex: 1; }
  .navbar .nav-btn {
    padding: 6px 16px; border: none; border-radius: 4px;
    cursor: pointer; font-size: 14px; font-family: inherit;
    background: #eef1f5; color: #555;
  }
  .navbar .nav-btn.active { background: #2a5cb5; color: white; }
  .navbar .nav-btn:hover:not(.active) { background: #dce3ec; }
  .navbar .badge {
    background: #e74c3c; color: white; font-size: 12px;
    border-radius: 10px; padding: 1px 8px; margin-left: 4px;
  }
  .navbar .logout-btn {
    background: none; border: 1px solid #ccc; border-radius: 4px;
    padding: 6px 14px; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .navbar .logout-btn:hover { background: #fce8ea; border-color: #b8202f; color: #b8202f; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  .page { display: none; }
  .page.active { display: block; }

  /* 商品卡片網格 */
  .product-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .product-card {
    background: white; border-radius: 8px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: 0.15s;
  }
  .product-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.12); transform: translateY(-2px); }
  .product-card .img-area {
    height: 140px; background: #eef1f5;
    display: flex; align-items: center; justify-content: center;
    color: #999; font-size: 36px;
  }
  .product-card .info { padding: 14px; }
  .product-card .info h3 { font-size: 16px; margin-bottom: 4px; }
  .product-card .info .price { color: #e74c3c; font-size: 18px; font-weight: bold; }
  .product-card .info .seller { color: #888; font-size: 13px; margin: 4px 0 8px; }
  .product-card .info .add-btn {
    width: 100%; padding: 8px; border: none; border-radius: 4px;
    background: #2a5cb5; color: white; cursor: pointer; font-size: 14px; font-family: inherit;
  }
  .product-card .info .add-btn:hover { background: #3572d0; }

  /* 購物車列表 */
  .cart-empty {
    text-align: center; padding: 60px 20px; color: #999;
  }
  .cart-empty .big-icon { font-size: 48px; margin-bottom: 10px; }
  .cart-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .cart-table th { background: #f8f9fb; padding: 12px 10px; text-align: left; font-size: 14px; color: #666; }
  .cart-table td { padding: 14px 10px; border-top: 1px solid #eee; font-size: 14px; vertical-align: middle; }
  .cart-table .qty-btn {
    display: inline-flex; align-items: center; gap: 0;
  }
  .cart-table .qty-btn button {
    width: 32px; height: 32px; border: 1px solid #ccc; background: white;
    cursor: pointer; font-size: 16px; font-family: inherit;
  }
  .cart-table .qty-btn button:hover { background: #eef1f5; }
  .cart-table .qty-btn span {
    display: inline-block; width: 40px; text-align: center; font-size: 15px;
  }
  .cart-table .remove-link {
    color: #b8202f; cursor: pointer; font-size: 13px;
  }
  .cart-table .remove-link:hover { text-decoration: underline; }

  .cart-footer {
    margin-top: 20px; background: white; border-radius: 8px;
    padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    text-align: right;
  }
  .cart-footer .total-label { font-size: 16px; color: #666; }
  .cart-footer .total-amount { font-size: 28px; font-weight: bold; color: #e74c3c; margin-left: 10px; }
  .cart-footer .checkout-btn {
    display: inline-block; margin-top: 12px; padding: 12px 40px;
    background: #2a5cb5; color: white; border: none; border-radius: 4px;
    font-size: 16px; font-family: inherit; cursor: pointer;
  }
  .cart-footer .checkout-btn:hover { background: #3572d0; }

  #訊息 {
    text-align: center; margin-top: 12px; padding: 8px; border-radius: 4px; font-size: 14px;
  }
  #訊息.success { background: #e8f8ec; color: #1a7a35; }
  #訊息.error   { background: #fce8ea; color: #b8202f; }

  @media (max-width: 600px) {
    .product-grid { grid-template-columns: 1fr 1fr; }
    .cart-table th, .cart-table td { padding: 8px 6px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="navbar">
  <h2>🛒 電商購物</h2>
  <button class="nav-btn active" id="tab-products" onclick="切換頁面('products')">商品瀏覽</button>
  <button class="nav-btn" id="tab-cart" onclick="切換頁面('cart')">購物車 <span id="cart-count" class="badge" style="display:none">0</span></button>
  <div class="spacer"></div>
  <span id="welcome" style="font-size:14px;color:#666;"></span>
  <button class="logout-btn" onclick="登出()">登出</button>
</div>

<div class="container">
  <!-- 商品瀏覽頁 -->
  <div id="page-products" class="page active">
    <div style="margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <h2 style="font-size:20px;">所有商品</h2>
      <span id="product-count" style="color:#888;font-size:14px;"></span>
    </div>
    <div id="product-grid" class="product-grid"></div>
  </div>

  <!-- 購物車頁 -->
  <div id="page-cart" class="page">
    <h2 style="font-size:20px;margin-bottom:16px;">我的購物車</h2>
    <div id="cart-content"></div>
  </div>
</div>

<div id="訊息"></div>

<script>
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user || user.role !== 'buyer') { window.location.href = '/'; }

document.getElementById('welcome').textContent = `${user.username} 您好`;

function 登出() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function 顯示訊息(text, kind) {
  const el = document.getElementById('訊息');
  el.textContent = text; el.className = kind;
  if (text) setTimeout(() => { el.textContent = ''; el.className = ''; }, 2500);
}

function 切換頁面(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'cart') 載入購物車();
}

// ===== 商品瀏覽 =====
async function 載入商品() {
  const res = await fetch('/api/products');
  const data = await res.json();
  if (!data.ok) return;
  const grid = document.getElementById('product-grid');
  document.getElementById('product-count').textContent = `共 ${data.products.length} 項商品`;
  grid.innerHTML = data.products.map(p => `
    <div class="product-card">
      <div class="img-area">📦</div>
      <div class="info">
        <h3>${p.name}</h3>
        <div class="price">$${p.price}</div>
        <div class="seller">商家：${p.seller_name}</div>
        <button class="add-btn" onclick="加入購物車(${p.id})">加入購物車</button>
      </div>
    </div>
  `).join('');
}

async function 加入購物車(productId) {
  const res = await fetch('/api/cart/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user_id: user.id, product_id: productId, quantity: 1}),
  });
  const data = await res.json();
  if (data.ok) {
    顯示訊息('✅ 已加入購物車', 'success');
    更新購物車徽章();
  } else {
    顯示訊息('❌ ' + data.error, 'error');
  }
}

// ===== 購物車 =====
async function 載入購物車() {
  const res = await fetch(`/api/cart?user_id=${user.id}`);
  const data = await res.json();
  const container = document.getElementById('cart-content');
  if (!data.ok) { container.innerHTML = '<div class="cart-empty"><div class="big-icon">⚠️</div><p>無法載入購物車</p></div>'; return; }
  if (data.items.length === 0) {
    container.innerHTML = '<div class="cart-empty"><div class="big-icon">🛒</div><p>購物車是空的，去逛逛商品吧！</p></div>';
    document.getElementById('cart-count').style.display = 'none';
    return;
  }
  document.getElementById('cart-count').style.display = '';
  document.getElementById('cart-count').textContent = data.items.length;

  let html = `<table class="cart-table">
    <thead><tr><th>商品</th><th>單價</th><th>數量</th><th>小計</th><th></th></tr></thead><tbody>`;
  data.items.forEach(item => {
    html += `<tr>
      <td><strong>${item.name}</strong></td>
      <td>$${item.price}</td>
      <td>
        <div class="qty-btn">
          <button onclick="修改數量(${item.product_id}, ${item.quantity - 1})">−</button>
          <span>${item.quantity}</span>
          <button onclick="修改數量(${item.product_id}, ${item.quantity + 1})">+</button>
        </div>
      </td>
      <td>$${item.subtotal}</td>
      <td><span class="remove-link" onclick="修改數量(${item.product_id}, 0)">移除</span></td>
    </tr>`;
  });
  html += `</tbody></table>`;
  html += `<div class="cart-footer">
    <div>
      <span class="total-label">總金額</span>
      <span class="total-amount">$${data.total}</span>
    </div>
    <button class="checkout-btn" onclick="顯示訊息('🛒 結帳功能將在下一階段實作', 'success')">前往結帳</button>
  </div>`;
  container.innerHTML = html;
}

async function 修改數量(productId, newQty) {
  const res = await fetch('/api/cart/update', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user_id: user.id, product_id: productId, quantity: newQty}),
  });
  const data = await res.json();
  if (data.ok) {
    載入購物車();
    更新購物車徽章();
  }
}

async function 更新購物車徽章() {
  const res = await fetch(`/api/cart?user_id=${user.id}`);
  const data = await res.json();
  if (data.ok && data.items.length > 0) {
    document.getElementById('cart-count').style.display = '';
    document.getElementById('cart-count').textContent = data.items.length;
  } else {
    document.getElementById('cart-count').style.display = 'none';
  }
}

// 初始化
載入商品();
更新購物車徽章();
</script>
</body>
</html>
