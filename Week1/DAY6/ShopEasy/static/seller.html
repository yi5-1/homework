<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>商家後台 - 電商購物網站</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft JhengHei', sans-serif;
    background: #f2f4f8; color: #333;
  }
  .navbar {
    background: white; padding: 12px 24px;
    display: flex; align-items: center; gap: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 10;
  }
  .navbar h2 { font-size: 18px; color: #b85a2a; }
  .navbar .spacer { flex: 1; }
  .navbar span { font-size: 14px; color: #666; }
  .navbar .logout-btn {
    background: none; border: 1px solid #ccc; border-radius: 4px;
    padding: 6px 14px; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .navbar .logout-btn:hover { background: #fce8ea; border-color: #b8202f; color: #b8202f; }

  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }

  /* 儀表板 */
  .dashboard {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .dashboard-card {
    flex: 1; min-width: 180px; background: white; border-radius: 8px;
    padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    text-align: center;
  }
  .dashboard-card .number {
    font-size: 36px; font-weight: bold; margin-top: 6px;
  }
  .dashboard-card .label { font-size: 14px; color: #888; }
  .dashboard-card .number.green  { color: #1a7a35; }
  .dashboard-card .number.orange { color: #b85a2a; }

  /* 上架表單 */
  .form-card {
    background: white; border-radius: 8px; padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px;
  }
  .form-card h3 { margin-bottom: 12px; font-size: 16px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .form-row input, .form-row textarea {
    flex: 1; min-width: 180px; padding: 10px; border: 1px solid #ccc;
    border-radius: 4px; font-size: 14px; font-family: inherit;
  }
  .form-row input:focus, .form-row textarea:focus { outline: none; border-color: #b85a2a; }
  .form-row textarea { min-height: 60px; resize: vertical; }
  .form-card .submit-btn {
    padding: 10px 32px; border: none; border-radius: 4px;
    background: #b85a2a; color: white; cursor: pointer;
    font-size: 15px; font-family: inherit;
  }
  .form-card .submit-btn:hover { background: #d4743e; }

  /* 商品列表 */
  .product-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .product-table th { background: #f8f9fb; padding: 12px 10px; text-align: left; font-size: 14px; color: #666; }
  .product-table td { padding: 12px 10px; border-top: 1px solid #eee; font-size: 14px; }
  .product-table .empty-msg { padding: 40px; text-align: center; color: #999; }

  #訊息 {
    text-align: center; margin-top: 12px; padding: 8px; border-radius: 4px; font-size: 14px;
  }
  #訊息.success { background: #e8f8ec; color: #1a7a35; }
  #訊息.error   { background: #fce8ea; color: #b8202f; }
</style>
</head>
<body>

<div class="navbar">
  <h2>🏪 商家後台</h2>
  <div class="spacer"></div>
  <span id="welcome"></span>
  <button class="logout-btn" onclick="登出()">登出</button>
</div>

<div class="container">
  <!-- 數據儀表板 -->
  <div class="dashboard">
    <div class="dashboard-card">
      <div class="label">📦 上架商品數</div>
      <div class="number green" id="product-count">-</div>
    </div>
    <div class="dashboard-card">
      <div class="label">💰 累計收入金額</div>
      <div class="number orange" id="total-revenue">$ -</div>
    </div>
  </div>

  <!-- 上架表單 -->
  <div class="form-card">
    <h3>📤 上架新商品</h3>
    <div class="form-row">
      <input id="prod-name" type="text" placeholder="商品名稱" maxlength="100">
      <input id="prod-price" type="number" step="0.01" min="0" placeholder="價格">
    </div>
    <div class="form-row">
      <textarea id="prod-desc" placeholder="商品描述（選填）"></textarea>
    </div>
    <button class="submit-btn" onclick="上架商品()">確認上架</button>
  </div>

  <!-- 商品列表 -->
  <h3 style="margin-bottom:10px;font-size:16px;">📋 我的商品</h3>
  <table class="product-table">
    <thead><tr><th>名稱</th><th>價格</th><th>描述</th><th>上架時間</th></tr></thead>
    <tbody id="product-list"></tbody>
  </table>
</div>

<div id="訊息"></div>

<script>
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user || user.role !== 'seller') { window.location.href = '/'; }

document.getElementById('welcome').textContent = `${user.username} 您好`;

function 登出() {
  localStorage.removeItem('user');
  window.location.href = '/';
}

function 顯示訊息(text, kind) {
  const el = document.getElementById('訊息');
  el.textContent = text; el.className = kind;
  if (text) setTimeout(() => { el.textContent = ''; el.className = ''; }, 3000);
}

// ===== 儀表板 =====
async function 載入儀表板() {
  const res = await fetch(`/api/seller/dashboard?seller_id=${user.id}`);
  const data = await res.json();
  if (!data.ok) return;
  document.getElementById('product-count').textContent = data.product_count;
  document.getElementById('total-revenue').textContent = `$ ${data.total_revenue}`;

  const tbody = document.getElementById('product-list');
  if (data.products.length === 0) {
    tbody.innerHTML = '<tr><td class="empty-msg" colspan="4">尚未上架任何商品</td></tr>';
    return;
  }
  tbody.innerHTML = data.products.map(p => `
    <tr>
      <td><strong>${p.name}</strong></td>
      <td>$${p.price}</td>
      <td>${p.description || '-'}</td>
      <td style="color:#888;font-size:13px;">${p.created_at.slice(0, 10)}</td>
    </tr>
  `).join('');
}

// ===== 上架商品 =====
async function 上架商品() {
  const name = document.getElementById('prod-name').value.trim();
  const price = parseFloat(document.getElementById('prod-price').value);
  const description = document.getElementById('prod-desc').value.trim();

  if (!name) { 顯示訊息('請輸入商品名稱', 'error'); return; }
  if (isNaN(price) || price < 0) { 顯示訊息('請輸入有效價格', 'error'); return; }

  const res = await fetch('/api/seller/products', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({seller_id: user.id, name, price, description}),
  });
  const data = await res.json();
  if (data.ok) {
    顯示訊息(`✅ ${name} 上架成功！`, 'success');
    document.getElementById('prod-name').value = '';
    document.getElementById('prod-price').value = '';
    document.getElementById('prod-desc').value = '';
    載入儀表板();
  } else {
    顯示訊息('❌ ' + data.error, 'error');
  }
}

載入儀表板();
</script>
</body>
</html>
