{% extends "base.html" %}
{% block title %}管理員登入{% endblock %}
{% block content %}
<section class="section auth-form">
    <h1>🔐 管理員登入</h1>
    <form id="admin-login-form">
        <div class="form-group">
            <label>帳號</label>
            <input type="text" id="admin-username" required>
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="admin-password" required>
        </div>
        <button type="submit" class="btn btn-primary">登入</button>
    </form>
    <div id="admin-login-msg" style="margin-top:1rem"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('admin-login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('admin-username').value,
                password: document.getElementById('admin-password').value
            })
        })
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('admin-login-msg');
            if (data.ok) {
                el.innerHTML = '<div class="alert alert-success">登入成功，即將跳轉...</div>';
                setTimeout(() => window.location.href = '/admin/dashboard', 1000);
            } else {
                el.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
            }
        });
    });
</script>
{% endblock %}
